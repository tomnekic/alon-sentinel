services:

  # ── Database ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       alon_sentinel_db
      POSTGRES_USER:     alon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in the root .env file}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U alon -d alon_sentinel_db"]
      interval: 5s
      timeout:  5s
      retries:  10

  # ── One-shot initialisation (migrations + RBAC seed + admin user) ─────────
  init:
    build:
      context: ./alon_sentinel
    command: >
      sh -c "
        /usr/local/bin/migrate &&
        /usr/local/bin/seed_admin_role_permissions &&
        /usr/local/bin/provision_admin_user
      "
    environment:
      DATABASE_URL:                  postgresql://alon:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in the root .env file}@postgres/alon_sentinel_db
      WEBHOOK_SECRET_ENCRYPTION_KEY: ${WEBHOOK_SECRET_ENCRYPTION_KEY:?WEBHOOK_SECRET_ENCRYPTION_KEY must be set in the root .env file}
      SEED_ADMIN_EMAIL:              ${SEED_ADMIN_EMAIL:-admin@localhost}
      SEED_ADMIN_PASSWORD:           ${SEED_ADMIN_PASSWORD:?SEED_ADMIN_PASSWORD must be set in the root .env file}
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  # ── API server ─────────────────────────────────────────────────────────────
  api:
    build:
      context: ./alon_sentinel
    command: /usr/local/bin/api
    environment:
      DATABASE_URL:                    postgresql://alon:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in the root .env file}@postgres/alon_sentinel_db
      API_BIND_ADDRESS:                0.0.0.0:3000
      COOKIE_SECURE:                   "${COOKIE_SECURE:-true}"
      WEBHOOK_SECRET_ENCRYPTION_KEY:   ${WEBHOOK_SECRET_ENCRYPTION_KEY:?WEBHOOK_SECRET_ENCRYPTION_KEY must be set in the root .env file}
      API_DB_MAX_CONNECTIONS:          "40"
    healthcheck:
      test:     ["CMD-SHELL", "curl -f http://localhost:3000/ready || exit 1"]
      interval: 5s
      timeout:  3s
      retries:  10
      start_period: 5s
    # Localhost-only direct API access (curl, scripts, local clients).
    # Use a reverse proxy or explicitly change API_HOST_ADDRESS for remote access.
    ports:
      - "${API_HOST_ADDRESS:-127.0.0.1}:${API_HOST_PORT:-3000}:3000"
    depends_on:
      init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Background worker ──────────────────────────────────────────────────────
  worker:
    build:
      context: ./alon_sentinel
    command: /usr/local/bin/worker
    environment:
      DATABASE_URL:                  postgresql://alon:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in the root .env file}@postgres/alon_sentinel_db
      WEBHOOK_SECRET_ENCRYPTION_KEY: ${WEBHOOK_SECRET_ENCRYPTION_KEY:?WEBHOOK_SECRET_ENCRYPTION_KEY must be set in the root .env file}
    depends_on:
      init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Admin UI (nginx) ───────────────────────────────────────────────────────
  admin:
    build:
      context: ./alon_sentinel_admin
      args:
        VITE_SHOW_DEMO_ACCOUNT: ${VITE_SHOW_DEMO_ACCOUNT:-false}
    ports:
      - "${ADMIN_HOST_ADDRESS:-127.0.0.1}:${ADMIN_HOST_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
