server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Security headers — applied to all responses that don't override add_header below.
    # Note: nginx does not merge add_header between parent and child blocks; any child
    # block that sets its own add_header must repeat the headers it needs.
    add_header X-Frame-Options           "DENY"                                                                                                                                      always;
    add_header X-Content-Type-Options    "nosniff"                                                                                                                                   always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"                                                                                                           always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"                                                                                                  always;

    # Proxy API requests to the backend — same-origin from the browser's
    # perspective, so no CORS preflight is triggered.
    location /v1/ {
        proxy_pass         http://api:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # Static assets — long cache, content-addressed by Vite's hashed filenames.
    # This block overrides the parent's add_header, so repeat the headers that matter
    # for sub-resources (nosniff prevents browsers from MIME-sniffing JS and CSS).
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control         "public, immutable" always;
        add_header X-Content-Type-Options "nosniff"          always;
        try_files $uri =404;
    }

    # SPA fallback — all unmatched paths serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
