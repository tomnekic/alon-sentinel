openapi: 3.1.0
info:
  title: Alon Sentinel API
  version: 1.0.0
  summary: Stable public HTTP contract for Alon Sentinel v1.
  description: |
    Alon Sentinel is an API-first monitoring service. This contract mirrors
    the Axum route surface implemented under `src/api/routes`.
servers:
  - url: http://127.0.0.1:3000
    description: Local development
security:
  - bearerAuth: []
tags:
  - name: Health
  - name: Metrics
  - name: Auth
  - name: Admin Auth
  - name: Admin
  - name: Sites
  - name: Monitoring
  - name: Notifications
  - name: Status Pages
paths:
  /live:
    get:
      operationId: getLive
      tags: [Health]
      summary: Liveness probe
      security: []
      responses: { "200": { $ref: "#/components/responses/JsonOk" } }
  /ready:
    get:
      operationId: getReady
      tags: [Health]
      summary: Readiness probe
      security: []
      responses: { "200": { $ref: "#/components/responses/JsonOk" } }
  /health:
    get:
      operationId: getHealth
      tags: [Health]
      summary: Service health check
      security: []
      responses: { "200": { $ref: "#/components/responses/JsonOk" } }
  /metrics:
    get:
      operationId: getMetrics
      tags: [Metrics]
      summary: Scrape Prometheus metrics
      security: []
      responses:
        "200":
          description: Prometheus exposition text
          content:
            text/plain:
              schema: { type: string }
  /v1/auth/token:
    post:
      operationId: issueApiToken
      tags: [Auth]
      summary: Issue an API client access token
      security: []
      requestBody: { $ref: "#/components/requestBodies/IssueToken" }
      responses: { "200": { $ref: "#/components/responses/JsonOk" }, "400": { $ref: "#/components/responses/BadRequest" }, "401": { $ref: "#/components/responses/Unauthorized" } }
  /v1/auth/revoke:
    post:
      operationId: revokeApiToken
      tags: [Auth]
      summary: Revoke the current API access token
      requestBody: { $ref: "#/components/requestBodies/RevokeToken" }
      responses: { "200": { $ref: "#/components/responses/JsonOk" }, "400": { $ref: "#/components/responses/BadRequest" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" } }
  /v1/admin/auth/login:
    post:
      operationId: issueAdminToken
      tags: [Admin Auth]
      summary: Issue an admin access token
      security: []
      requestBody: { $ref: "#/components/requestBodies/IssueAdminToken" }
      responses: { "200": { $ref: "#/components/responses/JsonOk" }, "400": { $ref: "#/components/responses/BadRequest" }, "401": { $ref: "#/components/responses/Unauthorized" }, "429": { $ref: "#/components/responses/TooManyRequests" } }
  /v1/admin/auth/logout:
    post:
      operationId: logoutAdmin
      tags: [Admin Auth]
      summary: Revoke the current admin access token
      responses: { "200": { $ref: "#/components/responses/JsonOk" }, "401": { $ref: "#/components/responses/Unauthorized" } }
  /v1/admin/auth/me:
    get:
      operationId: getAdminMe
      tags: [Admin Auth]
      summary: Get the current admin session
      responses: { "200": { $ref: "#/components/responses/JsonOk" }, "401": { $ref: "#/components/responses/Unauthorized" } }
  /v1/dashboard:
    get:
      operationId: getDashboard
      tags: [Admin]
      summary: Get global dashboard
      responses: { "200": { $ref: "#/components/responses/JsonOk" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" } }
  /v1/incidents:
    get:
      operationId: listGlobalIncidents
      tags: [Admin]
      summary: List global incidents
      parameters: [ { $ref: "#/components/parameters/Cursor" }, { $ref: "#/components/parameters/Limit" }, { $ref: "#/components/parameters/IncidentStatus" } ]
      responses: { "200": { $ref: "#/components/responses/PaginatedJsonOk" }, "400": { $ref: "#/components/responses/BadRequest" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" } }
  /v1/admin/users:
    get:
      operationId: listAdminUsers
      tags: [Admin]
      summary: List admin users
      responses: { "200": { $ref: "#/components/responses/JsonOk" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" } }
    post:
      operationId: createAdminUser
      tags: [Admin]
      summary: Create admin user
      requestBody: { $ref: "#/components/requestBodies/AdminUserCreate" }
      responses: { "201": { $ref: "#/components/responses/JsonCreated" }, "400": { $ref: "#/components/responses/BadRequest" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" } }
  /v1/admin/users/{user_id}:
    parameters: [ { $ref: "#/components/parameters/UserId" } ]
    patch:
      operationId: updateAdminUser
      tags: [Admin]
      summary: Update admin user
      requestBody: { $ref: "#/components/requestBodies/AdminUserUpdate" }
      responses: { "200": { $ref: "#/components/responses/JsonOk" }, "400": { $ref: "#/components/responses/BadRequest" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" }, "404": { $ref: "#/components/responses/NotFound" } }
    delete:
      operationId: deleteAdminUser
      tags: [Admin]
      summary: Delete admin user
      responses: { "200": { $ref: "#/components/responses/JsonOk" }, "400": { $ref: "#/components/responses/BadRequest" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" }, "404": { $ref: "#/components/responses/NotFound" } }
  /v1/admin/roles:
    get:
      operationId: listRoles
      tags: [Admin]
      summary: List roles
      responses: { "200": { $ref: "#/components/responses/JsonOk" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" } }
    post:
      operationId: createRole
      tags: [Admin]
      summary: Create role
      requestBody: { $ref: "#/components/requestBodies/RoleCreate" }
      responses: { "201": { $ref: "#/components/responses/JsonCreated" }, "400": { $ref: "#/components/responses/BadRequest" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" } }
  /v1/admin/roles/{role_id}:
    parameters: [ { $ref: "#/components/parameters/RoleId" } ]
    patch:
      operationId: updateRole
      tags: [Admin]
      summary: Update role
      requestBody: { $ref: "#/components/requestBodies/RoleUpdate" }
      responses: { "200": { $ref: "#/components/responses/JsonOk" }, "400": { $ref: "#/components/responses/BadRequest" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" }, "404": { $ref: "#/components/responses/NotFound" } }
    delete:
      operationId: deleteRole
      tags: [Admin]
      summary: Delete role
      responses: { "200": { $ref: "#/components/responses/JsonOk" }, "400": { $ref: "#/components/responses/BadRequest" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" }, "404": { $ref: "#/components/responses/NotFound" } }
  /v1/admin/permissions:
    get:
      operationId: listPermissions
      tags: [Admin]
      summary: List permissions
      responses: { "200": { $ref: "#/components/responses/JsonOk" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" } }
  /v1/admin/sites/{site_id}/incidents/{incident_id}/acknowledge:
    parameters: [ { $ref: "#/components/parameters/SiteId" }, { $ref: "#/components/parameters/IncidentId" } ]
    post:
      operationId: acknowledgeIncident
      tags: [Admin]
      summary: Acknowledge a site incident
      responses: { "200": { $ref: "#/components/responses/JsonOk" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" }, "404": { $ref: "#/components/responses/NotFound" } }
  /v1/admin/api-clients:
    get:
      operationId: listApiClients
      tags: [Admin]
      summary: List API clients
      responses: { "200": { $ref: "#/components/responses/JsonOk" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" } }
    post:
      operationId: createApiClient
      tags: [Admin]
      summary: Create API client
      requestBody: { $ref: "#/components/requestBodies/ApiClientCreate" }
      responses: { "201": { $ref: "#/components/responses/JsonCreated" }, "400": { $ref: "#/components/responses/BadRequest" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" } }
  /v1/admin/api-clients/{client_id}:
    parameters: [ { $ref: "#/components/parameters/ClientId" } ]
    patch:
      operationId: updateApiClient
      tags: [Admin]
      summary: Update API client
      requestBody: { $ref: "#/components/requestBodies/ApiClientUpdate" }
      responses: { "200": { $ref: "#/components/responses/JsonOk" }, "400": { $ref: "#/components/responses/BadRequest" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" }, "404": { $ref: "#/components/responses/NotFound" } }
    delete:
      operationId: deleteApiClient
      tags: [Admin]
      summary: Delete API client
      responses: { "204": { description: API client deleted }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" }, "404": { $ref: "#/components/responses/NotFound" } }
  /v1/admin/api-clients/{client_id}/rotate-secret:
    parameters: [ { $ref: "#/components/parameters/ClientId" } ]
    post:
      operationId: rotateApiClientSecret
      tags: [Admin]
      summary: Rotate API client secret
      responses: { "200": { $ref: "#/components/responses/JsonOk" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" }, "404": { $ref: "#/components/responses/NotFound" } }
  /v1/sites:
    get:
      operationId: listSites
      tags: [Sites]
      summary: List sites
      parameters: [ { $ref: "#/components/parameters/Search" }, { $ref: "#/components/parameters/Limit" }, { $ref: "#/components/parameters/Cursor" } ]
      responses: { "200": { $ref: "#/components/responses/PaginatedJsonOk" }, "400": { $ref: "#/components/responses/BadRequest" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" } }
    post:
      operationId: createSite
      tags: [Sites]
      summary: Create site
      requestBody: { $ref: "#/components/requestBodies/SiteCreate" }
      responses: { "201": { $ref: "#/components/responses/JsonCreated" }, "400": { $ref: "#/components/responses/BadRequest" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" }, "409": { $ref: "#/components/responses/Conflict" } }
  /v1/sites/{site_id}:
    parameters: [ { $ref: "#/components/parameters/SiteId" } ]
    patch:
      operationId: updateSite
      tags: [Sites]
      summary: Update site
      requestBody: { $ref: "#/components/requestBodies/SiteUpdate" }
      responses: { "200": { $ref: "#/components/responses/JsonOk" }, "400": { $ref: "#/components/responses/BadRequest" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" }, "404": { $ref: "#/components/responses/NotFound" } }
    delete:
      operationId: deleteSite
      tags: [Sites]
      summary: Delete site
      responses: { "200": { $ref: "#/components/responses/JsonOk" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" }, "404": { $ref: "#/components/responses/NotFound" } }
  /v1/sites/{site_id}/summary:
    parameters: [ { $ref: "#/components/parameters/SiteId" }, { $ref: "#/components/parameters/Limit" } ]
    get:
      operationId: getSiteSummary
      tags: [Sites]
      summary: Get current site summary
      responses: { "200": { $ref: "#/components/responses/JsonOk" }, "400": { $ref: "#/components/responses/BadRequest" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" }, "404": { $ref: "#/components/responses/NotFound" } }
  /v1/sites/{site_id}/uptime:
    parameters: [ { $ref: "#/components/parameters/SiteId" }, { $ref: "#/components/parameters/UptimeWindow" } ]
    get:
      operationId: getSiteUptime
      tags: [Sites]
      summary: Get 7-day or 30-day uptime summary
      responses: { "200": { $ref: "#/components/responses/JsonOk" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" }, "404": { $ref: "#/components/responses/NotFound" } }
  /v1/sites/{site_id}/uptime/daily:
    parameters: [ { $ref: "#/components/parameters/SiteId" }, { $ref: "#/components/parameters/Days" } ]
    get:
      operationId: getSiteUptimeDaily
      tags: [Sites]
      summary: Get daily uptime buckets
      responses: { "200": { $ref: "#/components/responses/JsonOk" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" }, "404": { $ref: "#/components/responses/NotFound" } }
  /v1/sites/{site_id}/checks:
    parameters: [ { $ref: "#/components/parameters/SiteId" }, { $ref: "#/components/parameters/Limit" }, { $ref: "#/components/parameters/Cursor" }, { $ref: "#/components/parameters/Outcome" } ]
    get:
      operationId: listSiteChecks
      tags: [Monitoring]
      summary: List site check history
      responses: { "200": { $ref: "#/components/responses/PaginatedJsonOk" }, "400": { $ref: "#/components/responses/BadRequest" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" }, "404": { $ref: "#/components/responses/NotFound" } }
  /v1/sites/{site_id}/incidents:
    parameters: [ { $ref: "#/components/parameters/SiteId" }, { $ref: "#/components/parameters/Limit" }, { $ref: "#/components/parameters/Cursor" }, { $ref: "#/components/parameters/IncidentStatus" } ]
    get:
      operationId: listSiteIncidents
      tags: [Monitoring]
      summary: List site incidents
      responses: { "200": { $ref: "#/components/responses/PaginatedJsonOk" }, "400": { $ref: "#/components/responses/BadRequest" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" }, "404": { $ref: "#/components/responses/NotFound" } }
  /v1/sites/{site_id}/notifications/deliveries:
    parameters: [ { $ref: "#/components/parameters/SiteId" }, { $ref: "#/components/parameters/Limit" }, { $ref: "#/components/parameters/Cursor" }, { $ref: "#/components/parameters/DeliveryStatus" }, { $ref: "#/components/parameters/EventType" } ]
    get:
      operationId: listSiteNotificationDeliveries
      tags: [Notifications]
      summary: List site notification delivery history
      responses: { "200": { $ref: "#/components/responses/PaginatedJsonOk" }, "400": { $ref: "#/components/responses/BadRequest" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" }, "404": { $ref: "#/components/responses/NotFound" } }
  /v1/sites/{site_id}/notifications/channels:
    parameters: [ { $ref: "#/components/parameters/SiteId" } ]
    get:
      operationId: listSiteNotificationChannels
      tags: [Notifications]
      summary: List effective notification channels for a site
      responses: { "200": { $ref: "#/components/responses/JsonOk" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" }, "404": { $ref: "#/components/responses/NotFound" } }
  /v1/sites/{site_id}/notifications/channels/{channel_id}:
    parameters: [ { $ref: "#/components/parameters/SiteId" }, { $ref: "#/components/parameters/ChannelId" } ]
    patch:
      operationId: upsertSiteNotificationChannelOverride
      tags: [Notifications]
      summary: Upsert site notification channel override
      requestBody: { $ref: "#/components/requestBodies/SiteNotificationChannelOverride" }
      responses: { "200": { $ref: "#/components/responses/JsonOk" }, "400": { $ref: "#/components/responses/BadRequest" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" }, "404": { $ref: "#/components/responses/NotFound" } }
    delete:
      operationId: deleteSiteNotificationChannelOverride
      tags: [Notifications]
      summary: Delete site notification channel override
      responses: { "200": { $ref: "#/components/responses/JsonOk" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" }, "404": { $ref: "#/components/responses/NotFound" } }
  /v1/sites/{site_id}/status-page:
    parameters: [ { $ref: "#/components/parameters/SiteId" } ]
    get:
      operationId: getStatusPageConfig
      tags: [Status Pages]
      summary: Get status page configuration
      responses: { "200": { $ref: "#/components/responses/JsonOk" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" }, "404": { $ref: "#/components/responses/NotFound" } }
    put:
      operationId: upsertStatusPageConfig
      tags: [Status Pages]
      summary: Create or update status page configuration
      requestBody: { $ref: "#/components/requestBodies/StatusPageConfig" }
      responses: { "200": { $ref: "#/components/responses/JsonOk" }, "400": { $ref: "#/components/responses/BadRequest" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" }, "404": { $ref: "#/components/responses/NotFound" }, "409": { $ref: "#/components/responses/Conflict" } }
  /v1/heartbeat/{heartbeat_token}:
    parameters: [ { $ref: "#/components/parameters/HeartbeatToken" } ]
    post:
      operationId: recordHeartbeatPing
      tags: [Monitoring]
      summary: Record a heartbeat ping
      security: []
      responses: { "204": { description: Heartbeat recorded }, "404": { $ref: "#/components/responses/NotFound" } }
  /v1/notifications/channels:
    get:
      operationId: listNotificationChannels
      tags: [Notifications]
      summary: List installation notification channels
      responses: { "200": { $ref: "#/components/responses/JsonOk" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" } }
    post:
      operationId: createNotificationChannel
      tags: [Notifications]
      summary: Create installation notification channel
      requestBody: { $ref: "#/components/requestBodies/NotificationChannel" }
      responses: { "201": { $ref: "#/components/responses/JsonCreated" }, "400": { $ref: "#/components/responses/BadRequest" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" } }
  /v1/notifications/channels/{channel_id}:
    parameters: [ { $ref: "#/components/parameters/ChannelId" } ]
    patch:
      operationId: updateNotificationChannel
      tags: [Notifications]
      summary: Update installation notification channel
      requestBody: { $ref: "#/components/requestBodies/NotificationChannel" }
      responses: { "200": { $ref: "#/components/responses/JsonOk" }, "400": { $ref: "#/components/responses/BadRequest" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" }, "404": { $ref: "#/components/responses/NotFound" } }
    delete:
      operationId: deleteNotificationChannel
      tags: [Notifications]
      summary: Delete installation notification channel
      responses: { "200": { $ref: "#/components/responses/JsonOk" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" }, "404": { $ref: "#/components/responses/NotFound" } }
  /v1/public/status/{slug}:
    parameters: [ { $ref: "#/components/parameters/StatusSlug" } ]
    get:
      operationId: getPublicStatusPage
      tags: [Status Pages]
      summary: Get a public status page
      security: []
      responses: { "200": { $ref: "#/components/responses/JsonOk" }, "404": { $ref: "#/components/responses/NotFound" } }
  /v1/sites/{site_id}/monitoring/http:
    parameters: [ { $ref: "#/components/parameters/SiteId" } ]
    get: { operationId: getHttpSiteMonitor, tags: [Monitoring], summary: List HTTP monitors for a site, responses: { "200": { $ref: "#/components/responses/JsonOk" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" }, "404": { $ref: "#/components/responses/NotFound" } } }
    put: { operationId: upsertHttpSiteMonitor, tags: [Monitoring], summary: Create or update an HTTP monitor, requestBody: { $ref: "#/components/requestBodies/HttpMonitor" }, responses: { "200": { $ref: "#/components/responses/JsonOk" }, "400": { $ref: "#/components/responses/BadRequest" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" }, "404": { $ref: "#/components/responses/NotFound" } } }
    delete: { operationId: disableHttpSiteMonitors, tags: [Monitoring], summary: Disable all HTTP monitors for a site, responses: { "200": { $ref: "#/components/responses/JsonOk" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" }, "404": { $ref: "#/components/responses/NotFound" } } }
  /v1/sites/{site_id}/monitoring/http/{monitor_id}:
    parameters: [ { $ref: "#/components/parameters/SiteId" }, { $ref: "#/components/parameters/MonitorId" } ]
    patch: { operationId: updateHttpSiteMonitor, tags: [Monitoring], summary: Update a specific HTTP monitor, requestBody: { $ref: "#/components/requestBodies/HttpMonitor" }, responses: { "200": { $ref: "#/components/responses/JsonOk" }, "400": { $ref: "#/components/responses/BadRequest" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" }, "404": { $ref: "#/components/responses/NotFound" } } }
    delete: { operationId: disableHttpSiteMonitor, tags: [Monitoring], summary: Disable a specific HTTP monitor, responses: { "200": { $ref: "#/components/responses/JsonOk" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" }, "404": { $ref: "#/components/responses/NotFound" } } }
  /v1/sites/{site_id}/monitoring/http/{monitor_id}/pause:
    parameters: [ { $ref: "#/components/parameters/SiteId" }, { $ref: "#/components/parameters/MonitorId" } ]
    post: { operationId: pauseHttpSiteMonitor, tags: [Monitoring], summary: Pause a specific HTTP monitor, responses: { "200": { $ref: "#/components/responses/JsonOk" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" }, "404": { $ref: "#/components/responses/NotFound" } } }
  /v1/sites/{site_id}/monitoring/http/{monitor_id}/resume:
    parameters: [ { $ref: "#/components/parameters/SiteId" }, { $ref: "#/components/parameters/MonitorId" } ]
    post: { operationId: resumeHttpSiteMonitor, tags: [Monitoring], summary: Resume a specific HTTP monitor, responses: { "200": { $ref: "#/components/responses/JsonOk" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" }, "404": { $ref: "#/components/responses/NotFound" } } }
  /v1/sites/{site_id}/monitoring/ssl:
    parameters: [ { $ref: "#/components/parameters/SiteId" } ]
    get: { operationId: getSslSiteMonitor, tags: [Monitoring], summary: List SSL monitors for a site, responses: { "200": { $ref: "#/components/responses/JsonOk" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" }, "404": { $ref: "#/components/responses/NotFound" } } }
    put: { operationId: upsertSslSiteMonitor, tags: [Monitoring], summary: Create or update an SSL monitor, requestBody: { $ref: "#/components/requestBodies/SslMonitor" }, responses: { "200": { $ref: "#/components/responses/JsonOk" }, "400": { $ref: "#/components/responses/BadRequest" }, "401": { $ref: "#/components/responses/Unauthorized" }, "403": { $ref: "#/components/responses/Forbidden" }, "404": { $ref: "#/components/responses/NotFound" } } }
